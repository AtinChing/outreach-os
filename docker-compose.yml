services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    env_file: .env
    environment:
      - MASTER_DATABASE_URL=${MASTER_DATABASE_URL}
    ports:
      - "8000:8000"

  research-agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.research
    env_file: .env
    environment:
      - MASTER_DATABASE_URL=${MASTER_DATABASE_URL}
