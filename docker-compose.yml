services:
  # Local PostgreSQL database (Ghost DB replacement)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ghostpass
      POSTGRES_DB: master_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/master_schema.sql:/docker-entrypoint-initdb.d/1-master_schema.sql
      - ./db/job_schema.sql:/docker-entrypoint-initdb.d/2-job_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghost"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    env_file: .env
    environment:
      - MASTER_DATABASE_URL=${MASTER_DATABASE_URL}
      # Local stack has no Ghost MCP; research writes leads into the same Postgres as jobs.
      - RESEARCH_USE_MASTER_DATABASE=1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  research-agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.research
    env_file: .env
    environment:
      - MASTER_DATABASE_URL=${MASTER_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
